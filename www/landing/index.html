<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ze Maria Color</title>
<link rel="stylesheet" href="/shared/tokens.css">
<link rel="stylesheet" href="/shared/components.css">
<link rel="stylesheet" href="/shared/utils.css">
<style>
body {
    display: flex;
    align-items: center;
    justify-content: center;
}

.screen-logo:not(.u-hidden) { height: 48px; opacity: 0.6; margin: 0 auto 24px; display: block; }
.brand-wordmark { font-size: 15px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; color: var(--text); margin: 0 auto 24px; }
.landing-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.landing-sub { font-size: 13px; color: var(--dim); margin-bottom: 32px; line-height: 1.5; }
.landing-error { color: var(--danger); font-size: 12px; margin-top: 10px; min-height: 16px; }
</style>
</head>
<body>

<div class="panel-box">
    <img src="" alt="" class="screen-logo u-hidden" id="brand-logo">
    <div class="brand-wordmark" id="brand-fallback">Farbström</div>
    <div class="landing-title">Welcome</div>
    <div class="landing-sub">It appears you forgot the room link for your project. Please enter your room link below or ask your host for the correct URL.</div>
    <div class="form-row">
        <input type="text" id="landing-input" placeholder="/room-name-123abc" autocomplete="off" spellcheck="false">
    </div>
    <button class="btn btn-primary btn-lg btn-block" id="landing-btn">Go to Room</button>
    <p class="landing-error" id="landing-error"></p>
</div>

<script type="module" src="/dist/landing/main.js"></script>
</body>
</html>
