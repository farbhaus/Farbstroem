# Single-container deployment — BASE file. A plain `docker compose up -d` uses
# ONLY this file and pulls the published image (the deploy-host path; also
# `make deploy`). Local dev opts into docker-compose.dev.yml to build from source
# and bind-mount ./www:  make dev  (or  -f docker-compose.yml -f docker-compose.dev.yml).
services:
  farbstroem:
    image: farbhaus/farbstroem:${FARBSTROEM_TAG:-latest}
    container_name: farbstroem
    restart: unless-stopped
    ports:
      # WEB_BIND scopes who can reach the HTTP/HTTPS ports. Default 0.0.0.0
      # (standalone: this container is the public TLS edge). Behind an external
      # reverse proxy (e.g. a host Caddy on the same box) set WEB_BIND=127.0.0.1
      # in .env so the plain-HTTP port isn't world-reachable, bypassing TLS.
      # NOTE: Docker's published ports bypass ufw, so this bind is the control.
      - "${WEB_BIND:-0.0.0.0}:${HTTP_PORT:-80}:80"
      - "${WEB_BIND:-0.0.0.0}:${HTTPS_PORT:-443}:443"
      - "${WEB_BIND:-0.0.0.0}:${HTTPS_PORT:-443}:443/udp"
      - "1935:1935"
      - "9999:9999/udp"
      - "9998:9998/udp"
      - "3478:3478"
      - "10000-10009:10000-10009/udp"
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./data:/data
      # Caddy's auto-HTTPS material (internal CA + Let's Encrypt certs). Persist
      # it so recreates don't re-issue certs (Let's Encrypt rate limits) or
      # regenerate the local CA. (www/dist is baked into the image; the local
      # override re-adds ./www for live editing.)
      - caddy_data:/root/.local/share/caddy
      - caddy_config:/root/.config/caddy
      # Host /proc for the admin dashboard's resource metrics (PROC_PATH).
      - /proc:/host/proc:ro
    # .env supplies secrets plus SITE_ADDRESS / DOMAIN (default: localhost).
    # Browser-facing URLs (PUBLIC_ORIGIN, LIVEKIT_URL) are intentionally NOT set
    # here — entrypoint.sh derives them from SITE_ADDRESS so they always match
    # the Caddy-served origin. To deploy on a domain, set SITE_ADDRESS=your.domain
    # in .env. The vars below are internal (container-local) and never reach the
    # browser, so they stay hardcoded to localhost.
    env_file: .env
    environment:
      - PORT=4001
      - DB_PATH=/data/stream.db
      - DATA_PATH=/data
      - OME_API_URL=http://localhost:8081/v1
      - LIVEKIT_INTERNAL_URL=http://localhost:7880
      - PROC_PATH=/host/proc
    healthcheck:
      # Honest AND mode-independent: backend /healthz (app is up) AND a TCP probe
      # that Caddy is listening on :80 (catches a dead web tier — the original
      # bug). Avoids TLS/SNI so it works identically on localhost and a real
      # domain. bash is present (OME base); sh lacks /dev/tcp.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4001/healthz && bash -c '< /dev/tcp/127.0.0.1/80' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  caddy_data:
  caddy_config:
