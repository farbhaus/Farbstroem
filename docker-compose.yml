services:
  farbstroem:
    build: .
    container_name: farbstroem
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
      - "1935:1935"
      - "9999:9999/udp"
      - "9998:9998/udp"
      - "3478:3478"
      - "10000-10009:10000-10009/udp"
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./data:/data
      - ./www:/www
    env_file: .env
    environment:
      - PORT=4001
      - DB_PATH=/data/stream.db
      - DATA_PATH=/data
      - OME_API_URL=http://localhost:8081/v1
      - LIVEKIT_INTERNAL_URL=http://localhost:7880
      - LIVEKIT_URL=ws://localhost:7880
      - PUBLIC_ORIGIN=${PUBLIC_ORIGIN:-https://stream.zemariacolor.com}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:4001/healthz || exit 1]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
