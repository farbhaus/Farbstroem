# Configuration for cargo-about — generates THIRD_PARTY_NOTICES.md.
#   cargo about generate about.hbs -o ../THIRD_PARTY_NOTICES.md
#
# `accepted` lists every license we have reviewed and allow in the dependency
# tree. cargo-about fails if a crate's license is not on this list, which makes
# this file double as a license-compliance gate. Add a license here only after
# confirming it is compatible with AGPL-3.0 distribution.
accepted = [
    "Apache-2.0",
    "MIT",
    "MIT-0",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "Unlicense",
    "Unicode-3.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "AGPL-3.0",
]

# Treat the workspace's own crate the same on every target so the report is
# deterministic regardless of where it is generated.
targets = [
    "x86_64-unknown-linux-musl",
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
]
