name: Docker Build

on:
  # Publish only on push to main. dev pushes are covered by the PR build,
  # so building them again here just duplicates the Rust compile in ci.yml.
  push:
    branches: [main]
  # PR validation only when the image inputs change — avoids a full Rust
  # rebuild on PRs that don't touch the backend.
  pull_request:
    branches: [main, dev]
    paths:
      - 'backend/**'
      - '.github/workflows/docker.yml'

env:
  IMAGE: farbhaus/farbstroem-backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Publish only on a push to main. PRs and dev pushes build-validate only.
      - name: Decide whether to publish
        id: pub
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.pub.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: ${{ steps.pub.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
