name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mold and clang
        # Required by backend/.cargo/config.toml, which uses mold as the
        # linker for x86_64-unknown-linux-gnu builds.
        run: sudo apt-get update && sudo apt-get install -y mold clang
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo fmt
        run: cargo fmt -- --check
        working-directory: backend
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: backend
      - name: cargo build
        run: cargo build --release
        working-directory: backend
      - name: cargo test
        run: cargo test
        working-directory: backend

  audit:
    runs-on: ubuntu-latest
    # Non-blocking for now: the advisory DB evolves independently of this repo,
    # so a transitive RUSTSEC finding should not gate merges. Flip to hard fail
    # once the baseline is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        run: cargo audit
        working-directory: backend
