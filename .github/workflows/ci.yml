name: CI
on:
  push:
    branches: [main, audit]
  pull_request:
    branches: [main, audit]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo build --release
        working-directory: backend
      - run: cargo test
        working-directory: backend
