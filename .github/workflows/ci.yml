name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install mold and clang
        # Required by backend/.cargo/config.toml, which uses mold as the
        # linker for x86_64-unknown-linux-gnu builds.
        run: sudo apt-get update && sudo apt-get install -y mold clang
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo fmt
        run: cargo fmt -- --check
        working-directory: backend
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: backend
      - name: cargo build
        run: cargo build --release
        working-directory: backend
      - name: cargo test
        run: cargo test
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci
        working-directory: frontend
      - name: typecheck
        run: npm run typecheck
        working-directory: frontend
      - name: build
        run: npm run build
        working-directory: frontend

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # cargo-audit is a self-contained binary that reads Cargo.lock — no
      # Rust toolchain or workspace cache needed. Prebuilt install avoids
      # the multi-minute from-source `cargo install` on every run.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit
        working-directory: backend

  licenses:
    # Fails if THIRD_PARTY_NOTICES.md is stale relative to the current
    # dependency tree, so attribution stays current as deps change.
    # Regenerate locally with:
    #   cd backend && cargo about generate about.hbs -o ../THIRD_PARTY_NOTICES.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Install cargo-about
        # Pinned and prebuilt: notice output can differ across cargo-about
        # versions, and the published binary already has the `cli` feature
        # (a from-source `cargo install` would need --features cli).
        run: |
          curl -fsSL https://github.com/EmbarkStudios/cargo-about/releases/download/0.9.0/cargo-about-0.9.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --strip-components=1 -C /usr/local/bin --wildcards '*/cargo-about'
      - name: Regenerate third-party notices
        run: cargo about generate about.hbs -o ../THIRD_PARTY_NOTICES.md
        working-directory: backend
      - name: Commit updated notices if changed
        run: |
          if ! git diff --quiet -- THIRD_PARTY_NOTICES.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add THIRD_PARTY_NOTICES.md
            git commit -m "chore: update THIRD_PARTY_NOTICES.md"
            git push
          fi
          