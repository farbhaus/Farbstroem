name: Docker Build (single-container)

# Builds and publishes the all-in-one single-container image (Caddy + backend +
# OME + LiveKit + Valkey under supervisord) from the repo-root Dockerfile. The
# image is self-contained — it compiles the Rust backend and the TypeScript
# frontend internally, so deploy hosts need neither the source nor a toolchain.
#
# The backend-only image (docker.yml) is kept for main's multi-container path.

on:
  push:
    branches: [main]
    # Release tags publish an immutable :vX.Y.Z (for reproducible prod pinning /
    # rollback) alongside :latest + :sha-<short>.
    tags: ['v*.*.*']
  # PR validation only when an input to the single-container image changes.
  pull_request:
    branches: [main, dev]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'www/**'
      - 'ome/**'
      - 'caddy/**'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'supervisord.conf'
      - '.dockerignore'
      - '.github/workflows/docker-single.yml'

env:
  IMAGE: farbhaus/farbstroem

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Publish on a push to main or a release tag (v*). PRs and dev pushes
      # build-validate only.
      - name: Decide whether to publish
        id: pub
        run: |
          if [ "${{ github.event_name }}" = "push" ] && { [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; }; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.pub.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ steps.pub.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
