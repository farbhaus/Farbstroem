# Local development override — auto-merged by `docker compose` when present.
#
# Builds the single-container image from source instead of pulling the published
# zcolor/farbstroem image, and bind-mounts ./www so frontend edits
# (after `cd frontend && npm install && npm run build`) show up without a rebuild.
# Local changes take effect with:
#
#   docker compose up -d --build
#
# Deploy hosts must NOT use this file — they select the base only:
#
#   docker compose -f docker-compose.yml up -d
#
# (omitting -f auto-loads this override and would rebuild from source).
services:
  farbstroem:
    build:
      context: .
      # Honor the component pins from .env for local source builds. (Defaults
      # live in the Dockerfile and are what CI bakes into the published image.)
      args:
        OME_VERSION: ${OME_TAG:-v0.20.5}
        LIVEKIT_VERSION: ${LIVEKIT_TAG:-v1.12.0}
        CADDY_VERSION: ${CADDY_TAG:-2.11.3}
        VALKEY_VERSION: ${VALKEY_TAG:-8.1.7}
    volumes:
      # Live frontend assets over the copy baked into the image. Requires
      # www/dist to exist on the host (cd frontend && npm run build).
      - ./www:/www
